<!-- TITLE STENCIL: black outline with white fill. Convert text to outlines before final cutting if your laser software does not embed fonts. -->
<svg xmlns="http://www.w3.org/2000/svg" width="820" height="230" viewBox="0 0 820 230">
  <title>Hook Line and Towfish title stencil with black outline and white fill</title>
  <defs>
    <style>
      .title {
        font-family: Bahnschrift, "Arial Black", Arial, sans-serif;
        font-weight: 800;
        letter-spacing: 1px;
      }
      .top { font-size: 66px; }
      .bottom { font-size: 92px; }
    </style>
  </defs>
  <g id="BLACK_OUTLINE" fill="none" stroke="#000000" stroke-linejoin="round">
    <text class="title top" x="34" y="82" stroke-width="9">Hook Line and</text>
    <text class="title bottom" x="34" y="176" stroke-width="10">Towfish</text>
    <g transform="translate(390 96)" stroke="#000000" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="36" cy="15" r="11" fill="none" stroke-width="11"/>
      <path d="M36 29v68" fill="none" stroke-width="11"/>
      <path d="M17 52h38" fill="none" stroke-width="11"/>
      <path d="M6 77c8 26 26 38 30 38s22-12 30-38" fill="none" stroke-width="11"/>
      <path d="M6 77l-3 19 17-8" fill="none" stroke-width="11"/>
      <path d="M66 77l3 19-17-8" fill="none" stroke-width="11"/>
    </g>
  </g>
  <g id="WHITE_FILL" fill="#ffffff">
    <text class="title top" x="34" y="82">Hook Line and</text>
    <text class="title bottom" x="34" y="176">Towfish</text>
    <g transform="translate(390 96)" stroke="#ffffff" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="36" cy="15" r="11" fill="none" stroke-width="6.5"/>
      <path d="M36 29v68" fill="none" stroke-width="6.5"/>
      <path d="M17 52h38" fill="none" stroke-width="6.5"/>
      <path d="M6 77c8 26 26 38 30 38s22-12 30-38" fill="none" stroke-width="6.5"/>
      <path d="M6 77l-3 19 17-8" fill="none" stroke-width="6.5"/>
      <path d="M66 77l3 19-17-8" fill="none" stroke-width="6.5"/>
    </g>
  </g>
</svg>
